name: Python DevSecOps CI

# 1. Trigger the workflow on any push to the main branch
on:
  push:
    branches: [ "main" ]

jobs:
  quality-and-test:
    # 2. Run on a fresh virtual Ubuntu Linux instance
    runs-on: ubuntu-latest

    steps:
    # 3. Pull our code files from GitHub onto the virtual server
    - name: Checkout Code
      uses: actions/checkout@v4

    # 4. Initialize Python environment on the Linux server
    - name: Set up Python 3.10
      uses: actions/setup-python@v5
      with:
        python-version: "3.10"

    # 5. Upgrade pip (Python's package installer) and install our requirements.txt shopping list
    # We also install flake8 manually here just for syntax checking
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install flake8
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi

    # 6. CODE QUALITY GATE: Scan for syntax errors or messy formatting
    # If a developer forgets a colon or leaves unused imports, this step stops the pipeline!
    - name: Lint Code with Flake8
      run: |
        # stop the build if there are Python syntax errors or undefined names
        flake8 . --count --select=E9,F63,F7,F82 --show-source --statistics

    # 7. AUTOMATED TESTING GATE: Run our pytest framework
    - name: Run Unit Tests
      run: |
        pytest
